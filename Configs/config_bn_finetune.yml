# StyleTTS2 Bengali — FINE-TUNE CONFIG (Fastest Path to Good Quality)
#
# STRATEGY: Fine-tune from the official pre-trained English StyleTTS2 checkpoint
#            (LJSpeech) rather than training from scratch.
#
# WHY THIS IS FASTER:
#   - Stage 1 (200 epochs) is SKIPPED entirely.
#   - Acoustic encoder + decoder are language-agnostic; they transfer directly.
#   - Only the text front-end (BERT, text encoder) needs Bengali adaptation.
#   - Typical convergence: 20-50 epochs vs 200+100 epochs from scratch.
#
# HOW TO GET THE PRETRAINED CHECKPOINT:
#   Download from: https://huggingface.co/yl4579/StyleTTS2-LJSpeech
#   File: Models/LJSpeech/epoch_2nd_00100.pth
#   Place at:  Models/LJSpeech/epoch_2nd_00100.pth (relative to this repo root)
#
# USAGE:
#   python train_finetune_accelerate.py -p Configs/config_bn_finetune.yml

log_dir: "Models/Bengali"
first_stage_path: ""                              # NOT used — we load from pretrained_model
save_freq: 5
log_interval: 10
device: "cuda"
epochs: 50                                        # Usually enough; monitor val loss
batch_size: 16                                    # Adjust down if OOM (try 12, 10, 8)
max_len: 300                                      # Shorter clips = faster steps
pretrained_model: "Models/LJSpeech/epoch_2nd_00100.pth"   # ← EDIT THIS PATH
second_stage_load_pretrained: true                # Load from 2nd-stage checkpoint
load_only_params: true                            # Don't load English optimizer state

F0_path: "Utils/JDC/bst.t7"
ASR_config: "Utils/ASR/config.yml"
ASR_path: "Utils/ASR/epoch_00080.pth"

# Bengali BERT replaces English PL-BERT
PLBERT_dir: 'sagorsarker/bangla-bert-base'

data_params:
  train_data: "Data/bn_train_list.txt"
  val_data: "Data/bn_val_list.txt"
  root_path: ""
  OOD_data: "Data/bn_OOD_texts.txt"
  min_length: 50

preprocess_params:
  sr: 24000
  spect_params:
    n_fft: 2048
    win_length: 1200
    hop_length: 300

model_params:
  multispeaker: false

  dim_in: 64
  hidden_dim: 512
  max_conv_dim: 512
  n_layer: 3
  n_mels: 80

  n_token: 418
  max_dur: 50
  style_dim: 128
  dropout: 0.2

  decoder:
      type: 'istftnet'
      resblock_kernel_sizes: [3,7,11]
      upsample_rates: [10, 6]
      upsample_initial_channel: 512
      resblock_dilation_sizes: [[1,3,5], [1,3,5], [1,3,5]]
      upsample_kernel_sizes: [20, 12]
      gen_istft_n_fft: 20
      gen_istft_hop_size: 5

  # Use smaller SLM for speed during fine-tuning (swap to xlsr-53 if quality is low)
  slm:
      model: 'facebook/wav2vec2-base'
      sr: 16000
      hidden: 768
      nlayers: 13
      initial_channel: 64

  diffusion:
    embedding_mask_proba: 0.1
    transformer:
      num_layers: 3
      num_heads: 8
      head_features: 64
      multiplier: 2
    dist:
      sigma_data: 0.2
      estimate_sigma_data: true
      mean: -3.0
      std: 1.0

loss_params:
    lambda_mel: 5.
    lambda_gen: 1.
    lambda_slm: 1.
    lambda_mono: 1.
    lambda_s2s: 1.
    TMA_epoch: 0             # TMA active from epoch 0 since we start from stage 2

    lambda_F0: 1.
    lambda_norm: 1.
    lambda_dur: 1.
    lambda_ce: 20.
    lambda_sty: 1.
    lambda_diff: 1.

    diff_epoch: 0            # Diffusion active immediately (already trained in English)
    joint_epoch: 0           # Joint training from epoch 0

optimizer_params:
  lr: 0.00005                # Lower LR for fine-tuning (half of scratch LR)
  bert_lr: 0.000005          # Very low LR for BERT (it's already pretrained)
  ft_lr: 0.000005            # Low LR for acoustic modules (they transfer well)

slmadv_params:
  min_len: 400
  max_len: 500
  batch_percentage: 0.5
  iter: 10
  thresh: 5
  scale: 0.01
  sig: 1.5
