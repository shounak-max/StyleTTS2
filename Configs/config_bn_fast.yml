# StyleTTS2 Bengali Configuration -- SPEED-OPTIMIZED VARIANT
# Use this for faster iteration on limited hardware (RTX 4000).
# TRADE-OFFS: Slightly lower audio quality vs config_bn.yml.
# Switch back to config_bn.yml for your final production run.

log_dir: "Models/Bengali"
first_stage_path: "first_stage.pth"
save_freq: 5           # save every 5 epochs instead of 2 (less I/O overhead)
log_interval: 10
device: "cuda"
epochs_1st: 200
epochs_2nd: 100
batch_size: 16         # INCREASED from 8 — RTX 4000 Ada (20GB) can likely fit 16
                       # If you get OOM: try 12, then 10. Never go below 6.
max_len: 300           # REDUCED from 400 — shorter clips = faster steps, less padding waste
pretrained_model: ""
second_stage_load_pretrained: true
load_only_params: false

F0_path: "Utils/JDC/bst.t7"
ASR_config: "Utils/ASR/config.yml"
ASR_path: "Utils/ASR/epoch_00080.pth"

PLBERT_dir: 'sagorsarker/bangla-bert-base'

data_params:
  train_data: "Data/bn_train_list.txt"
  val_data: "Data/bn_val_list.txt"
  root_path: ""
  OOD_data: "Data/bn_OOD_texts.txt"
  min_length: 50

preprocess_params:
  sr: 24000
  spect_params:
    n_fft: 2048
    win_length: 1200
    hop_length: 300

model_params:
  multispeaker: false

  dim_in: 64
  hidden_dim: 512
  max_conv_dim: 512
  n_layer: 3
  n_mels: 80

  n_token: 418
  max_dur: 50
  style_dim: 128

  dropout: 0.2

  decoder:
      type: 'istftnet'
      resblock_kernel_sizes: [3,7,11]
      upsample_rates: [10, 6]
      upsample_initial_channel: 512
      resblock_dilation_sizes: [[1,3,5], [1,3,5], [1,3,5]]
      upsample_kernel_sizes: [20, 12]
      gen_istft_n_fft: 20
      gen_istft_hop_size: 5

  # SPEED CHANGE: use a smaller SLM model for the discriminator.
  # facebook/wav2vec2-base (95M params) vs wav2vec2-large-xlsr-53 (317M params).
  # This is the BIGGEST time saver in Stage 1 pre-TMA training.
  # Switch back to xlsr-53 in config_bn.yml for the final Stage 2 run.
  slm:
      model: 'facebook/wav2vec2-base'
      sr: 16000
      hidden: 768        # wav2vec2-base hidden size
      nlayers: 13        # wav2vec2-base has 12 transformer layers + 1 feature extractor
      initial_channel: 64

  diffusion:
    embedding_mask_proba: 0.1
    transformer:
      num_layers: 3
      num_heads: 8
      head_features: 64
      multiplier: 2
    dist:
      sigma_data: 0.2
      estimate_sigma_data: true
      mean: -3.0
      std: 1.0

loss_params:
    lambda_mel: 5.
    lambda_gen: 1.
    lambda_slm: 1.

    lambda_mono: 1.
    lambda_s2s: 1.
    TMA_epoch: 50

    lambda_F0: 1.
    lambda_norm: 1.
    lambda_dur: 1.
    lambda_ce: 20.
    lambda_sty: 1.
    lambda_diff: 1.

    diff_epoch: 20
    joint_epoch: 50

optimizer_params:
  lr: 0.0001
  bert_lr: 0.00001
  ft_lr: 0.00001

slmadv_params:
  min_len: 400
  max_len: 500
  batch_percentage: 0.5
  iter: 10
  thresh: 5
  scale: 0.01
  sig: 1.5
